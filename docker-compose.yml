services:

  # ─── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meridian-postgres-v6
    restart: unless-stopped
    environment:
      POSTGRES_DB:       meridian
      POSTGRES_USER:     meridian
      POSTGRES_PASSWORD: Meridian@2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - meridian-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ─── Node.js / Express Backend ────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: meridian-backend-v6
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgresql://meridian:Meridian@2026@postgres:5432/meridian
      PORT:                4000
      MERIDIAN_API_TOKEN:  sBY1FDoiZEkAwx0byReL7WIzp9cjd34NtQuf6KlrMhUGa5OP
    ports:
      - "4010:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meridian-net

  # ─── React / nginx Frontend ───────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # Embed API token at build time so Partner users can also sync to backend
        VITE_API_TOKEN: sBY1FDoiZEkAwx0byReL7WIzp9cjd34NtQuf6KlrMhUGa5OP
    container_name: meridian-frontend-v6
    ports:
      - "3020:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - meridian-net
    healthcheck:
      test:     ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout:  5s
      retries:  3

networks:
  meridian-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  uploads_data:
    driver: local
